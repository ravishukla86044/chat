services:
  mysql:
    image: mysql:8.0
    container_name: dms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: chat
      MYSQL_USER: chat
      MYSQL_PASSWORD: chatpass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: dms-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: chat
      DB_USER: chat
      DB_PASSWORD: chatpass
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"

  # Run the full test suite inside Docker (no local Java/Maven needed).
  # Tests run against the real `mysql` service over the compose network.
  #   Usage:  docker compose run --rm test
  test:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: chat
      DB_USER: chat
      DB_PASSWORD: chatpass
    command: ["mvn", "-B", "test"]
    profiles: ["test"]

volumes:
  mysql-data:
  maven-cache:
